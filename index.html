        :root {
            --bg-color: #05080a;

            --neon-green: #00ff9d;

        body, html {

            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex; justify-content: center; align-items: center;

        .card-container {

            position: relative; overflow: hidden;
        }

        .profile-section { position: relative; width: 120px; height: 120px; margin: 0 auto; }
        
        .profile-img-circle { 
            width: 100%; height: 100%; border-radius: 50%; 
            border: 3px solid var(--neon-yellow); object-fit: cover;
        }
        
        .live-tag-badge {
            background: #ff0000; font-size: 10px; font-weight: bold; padding: 3px 10px; 
            border-radius: 12px; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);

        .cricket-expert-title { color: var(--neon-yellow); font-size: 14px; font-weight: bold; margin-bottom: 25px; display: block; }

            margin-bottom: 25px; border-top: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); 
            padding: 15px 0; 
        }
        
        .vip-stat h3 { font-size: 18px; margin: 0; color: var(--neon-yellow); font-weight: bold; }
        .vip-stat p { font-size: 10px; margin: 5px 0 0; color: #8a99a4; text-transform: uppercase; font-weight: bold; }

        .accuracy-neon-box { 
            background: #0d161d; padding: 15px; border-radius: 15px; 
            margin-bottom: 20px; border: 1px solid var(--border-color); text-align: left;
        }
        
        .accuracy-text { font-size: 14px; font-weight: bold; display: flex; justify-content: space-between; margin-bottom: 10px; }
        
        .accuracy-bar-bg { width: 100%; height: 10px; background: var(--border-color); border-radius: 10px; overflow: hidden; }
        
        .accuracy-bar-fill { 
            width: 99%; height: 100%; background: var(--neon-green); border-radius: 10px; 
            box-shadow: 0 0 15px var(--neon-green); 
        }

        }
        
        .cta-btn:active { transform: scale(0.97); }
